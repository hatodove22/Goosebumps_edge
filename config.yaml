# Configuration (copied from config_example.yaml)
project:
  dataset_root: "dataset"
network:
  device_udp_cmd_port: 3333
camera:
  frame_width: 320
  frame_height: 240
  jpeg_quality: 20
  target_fps: 12
roi:
  mode: "fixed_center"
  size_px: 160
lighting:
  pwm_min: 0
  pwm_max: 255
  pwm_default: 60
  auto_luma_target: 150
  auto_kp: 0.8
  auto_ki: 0.05
quality:
  blur_threshold: 7.5
  sat_white_ratio_max: 0.02
  sat_black_ratio_max: 0.02
  imu_gnorm_threshold: 1.5
pilot_fft:
  smooth_window_sec: 1.0
  threshold_sigma: 3.0
  min_event_duration_sec: 1.0
  radial_band:
    mode: "pixel"
    r_min: 8
    r_max: 28
gate:
  auc_pos_neg_min: 0.80
  false_positive_motion_per_min_max: 1.0
  false_positive_light_per_min_max: 1.0
