; AtomS3R-CAM real-time inference firmware (LBP histogram + Logistic Regression)
; - Captures RGB565 frames from GC0308
; - Extracts center ROI -> downsample to 64x64 grayscale
; - Computes 8-neighbor LBP histogram (256 bins)
; - Logistic Regression inference (weights from include/model_lbp_lr.h)
; - Optional: upload frames to Collector (/upload) and send pred events to /event

[env:atoms3r_cam_infer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; Important for AtomS3R-CAM (8MB PSRAM)
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200
upload_speed = 115200

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    esp32-camera
