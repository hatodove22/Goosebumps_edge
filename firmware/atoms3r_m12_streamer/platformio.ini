; AtomS3R-M12 (OV3660) firmware for Goosebumps Collector
; - Wi-Fi JPEG upload via HTTP POST multipart/form-data
; - UDP JSON command listener (LED PWM, start/stop stream, ping, set_param)

[env:atoms3r_m12]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; Important for AtomS3R (8MB PSRAM)
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200
upload_speed = 115200

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    esp32-camera
    sparkfun/SparkFun BMI270 Arduino Library
